# =================================================================
#  MQTT Broker Configuration Matrix - LSS Project
#  This file provisions the operational behavior, network binding,
#  and logging verbosity for the Eclipse Mosquitto instance.
# =================================================================

# Bind the broker instance to the default unencrypted MQTT communication port
listener 1883

# Allow clients to connect and publish/subscribe without explicit credentials
# Validated for isolated Docker network topologies where local access is secured
allow_anonymous true

# Enable high-verbosity event tracking to output all connection and routing logs
log_type all